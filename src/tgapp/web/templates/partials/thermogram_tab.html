<div class="thermogram-tab settings-workspace">
  <div class="settings-sidebar-zone">
    {% include "partials/sidebar.html" %}
  </div>

  <div class="settings-main-zone">
    <div class="compact-panel plot-dashboard-panel">
      <div class="compact-panel-title">Термограмма</div>

      <form id="visibility-form" class="visibility-form">
        <div class="visibility-grid">
         <label class="visibility-item"><input id="hide-tg" name="hide_tg" type="checkbox" value="1" {% if processing_state.hide_tg|default(False) %}checked{% endif %}> ТГ</label>
          <label class="visibility-item"><input id="hide-dta" name="hide_dta" type="checkbox" value="1" {% if processing_state.hide_dta|default(False) %}checked{% endif %}> ДТА</label>
          <label class="visibility-item"><input id="hide-dtg" name="hide_dtg" type="checkbox" value="1" {% if processing_state.hide_dtg|default(processing_state.hide_dmdt|default(False)) %}checked{% endif %}> ТГП</label>
          <label class="visibility-item"><input id="hide-peaks-dta" name="hide_peaks_dta" type="checkbox" value="1" {% if processing_state.hide_peaks_dta|default(False) %}checked{% endif %}> Пики ДТА</label>
          <label class="visibility-item"><input id="hide-peaks-dmdt" name="hide_peaks_dmdt" type="checkbox" value="1" {% if processing_state.hide_peaks_dmdt|default(False) %}checked{% endif %}> Пики dmdt</label>
         <button type="submit" class="btn btn-default btn-compact-inline">Обновить</button>
        </div>
      </form>

      {% include "partials/plot_block.html" %}

      <div class="settings-footer-grid">
        <div class="button-row compact-button-row">
          <a href="{{ export_plot_url }}" id="download-plot-button" class="btn btn-default">Скачать график</a>
          <a href="{{ export_session_url }}" id="download-session-button" class="btn btn-default">Скачать CSV</a>
        </div>

        {% include "partials/effect_block.html" %}
      </div>
    </div>
  </div>
</div>
