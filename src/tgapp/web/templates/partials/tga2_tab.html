<div class="tga2-tab settings-workspace">
  <div class="settings-sidebar-zone">
    <form id="tga2-form"
          class="compact-panel compact-panel-section settings-form"
          method="post"
          action="{{ tga2_plot_url }}"
          hx-post="{{ tga2_plot_url }}"
          hx-target="#process-response"
          hx-swap="innerHTML">
      <div class="compact-panel-title">Настройки TGA2</div>
      <div class="checkbox compact-checkbox">
        <label>
         <input id="tga2-sg-mode"
                   name="sg_mode"
                   type="checkbox"
                   value="1"
                   data-sg-toggle="tga2-sg-mass-controls,tga2-sg-temp-controls,tga2-sg-dtg-controls"
                  {% if tga2_settings.sg_mode|default(False) %}checked{% endif %}>
          Savitzky-Golay сглаживание
        </label>
      </div>

      <div class="form-group compact-form-group sg-controls" id="tga2-sg-mass-controls">
        <label for="tga2-sg-mass-window" class="control-label">SG Window (масса)</label>
        <input id="tga2-sg-mass-window" name="sg_mass_window" type="range" min="3" max="51" step="2" value="{{ tga2_settings.sg_mass_window|default(11) }}" class="form-control range-control">
        <div class="range-value">{{ tga2_settings.sg_mass_window|default(11) }}</div>
      </div>

      <div class="form-group compact-form-group sg-controls" id="tga2-sg-temp-controls">
         <label for="tga2-sg-temp-window" class="control-label">SG Window (температура)</label>
         <input id="tga2-sg-temp-window" name="sg_temp_window" type="range" min="3" max="51" step="2" value="{{ tga2_settings.sg_temp_window|default(11) }}" class="form-control range-control">
         <div class="range-value">{{ tga2_settings.sg_temp_window|default(11) }}</div>
       </div>

       <div class="form-group compact-form-group sg-controls" id="tga2-sg-dtg-controls">
         <label for="tga2-sg-dtg-window" class="control-label">SG Window (ТГП)</label>
         <input id="tga2-sg-dtg-window" name="sg_dtg_window" type="range" min="3" max="51" step="2" value="{{ tga2_settings.sg_dtg_window|default(11) }}" class="form-control range-control">
         <div class="range-value">{{ tga2_settings.sg_dtg_window|default(11) }}</div>
       </div>

      <div class="visibility-grid">
        <input type="hidden" name="show_tg" value="{{ 0 if tga2_settings.hide_tg|default(False) else 1 }}" data-visibility-hidden="show_tg">
        <input type="hidden" name="show_dta" value="{{ 0 if tga2_settings.hide_dta|default(False) else 1 }}" data-visibility-hidden="show_dta">
        <input type="hidden" name="show_dtg" value="{{ 0 if tga2_settings.hide_dtg|default(False) else 1 }}" data-visibility-hidden="show_dtg">

        <label class="visibility-item">
          <input type="checkbox" {% if not tga2_settings.hide_tg|default(False) %}checked{% endif %} data-visibility-toggle="show_tg"> ТГ
        </label>
        <label class="visibility-item">
          <input type="checkbox" {% if not tga2_settings.hide_dta|default(False) %}checked{% endif %} data-visibility-toggle="show_dta"> ДТА
        </label>
        <label class="visibility-item">
          <input type="checkbox" {% if not tga2_settings.hide_dtg|default(False) %}checked{% endif %} data-visibility-toggle="show_dtg"> ТГП
        </label>
        <button type="submit" class="btn btn-default btn-compact-inline">Обновить</button>
      </div>
    </form>
  </div>

  <div class="settings-main-zone">
    <div class="compact-panel plot-dashboard-panel">
      <div class="compact-panel-title">TGA2</div>
      <div id="tga2-plot" class="main-plot" data-plot-json='{{ tga2_plot_json|e }}' data-plot-height="600px" style="height: 600px;"></div>
    </div>
  </div>
</div>
